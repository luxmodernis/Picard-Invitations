<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#070b1e">
<title>Picard vous invite</title>
<style>
  /* ---------- Police display (servie en local) ---------- */
  @font-face {
    font-family: 'Wulkan Display';
    src: url('fonts/wulkan_display_regular/wulkan_display_regular-webfont.woff2') format('woff2'),
         url('fonts/wulkan_display_regular/wulkan_display_regular-webfont.woff') format('woff');
    font-weight: normal;
    font-style: normal;
    font-display: swap;
  }
  @font-face {
    font-family: '4 Privet Drive';
    src: url('fonts/4PrivetDrive/4privetdrive-regular-webfont.woff2') format('woff2'),
         url('fonts/4PrivetDrive/4privetdrive-regular-webfont.woff') format('woff');
    font-weight: normal;
    font-style: normal;
    font-display: swap;
  }

  :root {
    --bg-deep: #04060f;
    --gold: #c9a84c;
    --gold-soft: #e6c879;
    --body: #c8c8e0;
  }

  /* Barre de bascule V1/V2 (TEMPORAIRE) */
  #version-switch {
    position: fixed; top: env(safe-area-inset-top, 0px); left: 50%;
    transform: translateX(-50%); z-index: 100000;
    display: flex; gap: 6px; padding: 6px;
    background: rgba(4, 6, 15, 0.55); backdrop-filter: blur(6px);
    border-radius: 0 0 12px 12px;
  }
  #version-switch .vs-btn {
    font: 600 13px/1 system-ui, sans-serif; letter-spacing: 0.04em;
    color: var(--gold-soft); text-decoration: none;
    padding: 7px 14px; border-radius: 8px;
    border: 1px solid rgba(201, 168, 76, 0.35);
  }
  #version-switch .vs-btn.vs-active {
    background: var(--gold); color: #1a1206; border-color: var(--gold);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }

  body {
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    color: var(--body);
    background: var(--bg-deep);
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
    -webkit-user-select: none;
    -moz-user-select: none;
    user-select: none;
    -webkit-touch-callout: none;
  }
  img { -webkit-user-drag: none; user-select: none; pointer-events: none; }

  @media (hover: hover) and (pointer: fine) {
    body.custom-cursor { cursor: none; }
  }

  h1, h2 {
    font-family: 'Wulkan Display', Georgia, serif;
    color: var(--gold);
    font-weight: normal;
    line-height: 1.12;
    text-shadow: 0 0 40px rgba(201, 168, 76, 0.35);
  }

  /* ============ Particle canvas ============ */
  #particles {
    position: fixed; inset: 0;
    width: 100%; height: 100%;
    pointer-events: none; z-index: 9999;
  }

  /* Canvas lucioles : dans bgwrap -> reçoit le flou au clic maintenu */
  #ff-canvas {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    pointer-events: none; z-index: 7;
  }

  /* ============ Scène fixe (scrollytelling) ============ */
  .stage-fixed { position: fixed; inset: 0; overflow: hidden; z-index: 1; }
  .scroll-driver { height: 300vh; }   /* longueur de scroll de la descente */

  /* Wrapper des décors : c'est lui qu'on floute au clic maintenu */
  .bgwrap { position: absolute; inset: 0; z-index: 1; will-change: filter; }

  .bg {
    position: absolute; inset: 0;
    background-repeat: no-repeat;
    will-change: transform, opacity;
    pointer-events: none;
  }
  /* Ciel étoilé : base toujours présente derrière -> jamais de bande noire */
  .ciel {
    background-image: url('IMG/Ciel.png');
    background-image: image-set(url('IMG/Ciel.webp') type('image/webp'), url('IMG/Ciel.png') type('image/png'));
    background-size: cover; background-position: center top; z-index: 1;
  }
  /* Nuage : calque PLEIN (non rogné), l'alpha haut/bas du PNG gère les bords */
  .nuages {
    background-image: url('IMG/Nuages.png');
    background-image: image-set(url('IMG/Nuages.webp') type('image/webp'), url('IMG/Nuages.png') type('image/png'));
    background-size: 100% auto; background-position: center top; z-index: 2;
  }
  /* Forêt : image entière, pleine largeur, ANCRÉE EN BAS du viewport.
     L'élément prend la hauteur native de l'image (plus haute que l'écran) ;
     la montée se fait par translateY -> on traverse cime→sol au scroll.
     PNG transparents en haut (silhouette de cimes) -> aucune coupure. */
  .foret {
    inset: auto 0 0 0;
    height: auto;
    aspect-ratio: 1920 / 2383;
    background-size: 100% auto;
    background-position: center bottom;
  }
  .f3 {
    background-image: url('IMG/foret-3.png');
    background-image: image-set(url('IMG/foret-3.webp') type('image/webp'), url('IMG/foret-3.png') type('image/png'));
    z-index: 3;
  }
  .f2 {
    background-image: url('IMG/foret-2.png');
    background-image: image-set(url('IMG/foret-2.webp') type('image/webp'), url('IMG/foret-2.png') type('image/png'));
    z-index: 4;
  }
  .f1 {
    background-image: url('IMG/foret-1.png');
    background-image: image-set(url('IMG/foret-1.webp') type('image/webp'), url('IMG/foret-1.png') type('image/png'));
    z-index: 5;
  }
  /* Voile bleu qui monte avec le clic maintenu (effet "Soyez prêts") */
  .veil {
    position: absolute; inset: 0; z-index: 6;
    background: radial-gradient(circle at 50% 52%, rgba(40,55,150,0.0), rgba(10,16,55,0.85) 80%);
    opacity: 0; pointer-events: none;
  }

  /* ---- Contenu ciel (logo / invite / scroll) ---- */
  .sky-content {
    position: absolute; inset: 0; z-index: 10;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center; pointer-events: none;
    will-change: opacity, transform;
  }
  .logo {
    width: clamp(90px, 11vw, 150px);
    height: auto;
    filter: drop-shadow(0 0 28px rgba(201, 168, 76, 0.45));
    margin-bottom: 2.2rem;
  }
  .invite-line {
    font-size: clamp(2rem, 5.5vw, 3.6rem);
    letter-spacing: 0.04em;
    margin-bottom: 3.4rem;
  }
  /* picto "scrollez" : agrandi (+25%) */
  .scroll-badge {
    width: clamp(165px, 17.5vw, 232px);
    height: auto;
    animation: floaty 3.4s ease-in-out infinite;
    pointer-events: auto; cursor: pointer;   /* V2 : badge cliquable */
  }
  /* Mobile : badge +20 % */
  @media (hover: none) and (pointer: coarse) {
    .scroll-badge { width: clamp(198px, 21vw, 278px); }
  }
  /* Phrase d'invite en bas du ciel (fond comme "le compte à rebours…") */
  .draw-hint {
    position: absolute; left: 0; right: 0; bottom: 5.5vh; z-index: 12;
    text-align: center; pointer-events: none;
    font-family: 'Wulkan Display', Georgia, serif;   /* même typo que "le compte à rebours" */
    font-size: clamp(0.9rem, 2.4vw, 1.3rem);
    color: var(--gold-soft); line-height: 1.65;
    text-shadow: none;
    will-change: opacity;
  }
  @keyframes floaty {
    0%, 100% { transform: translateY(0); opacity: 0.9; }
    50% { transform: translateY(10px); opacity: 1; }
  }

  /* ---- Scène forêt (orbe + textes) ---- */
  .forest-stage {
    position: absolute; inset: 0; z-index: 11;
    display: grid; place-items: center;
    text-align: center; pointer-events: none;
  }
  .forest-stage > * { grid-area: 1 / 1; }

  .orbe-wrap {
    width: clamp(260px, 52vw, 560px);
    aspect-ratio: 1 / 1;
    display: grid; place-items: center;
    will-change: transform, opacity;
    opacity: 0;
  }
  .orbe-spin { width: 100%; height: 100%; animation: spin 26s linear infinite; }
  .orbe-spin img {
    width: 100%; height: 100%; object-fit: contain;
    /* pas de filter:drop-shadow sur l'image qui tourne -> évite le clignotement Android */
  }
  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(-360deg); } }

  .txt {
    grid-area: 1 / 1; z-index: 3;
    font-family: 'Wulkan Display', Georgia, serif;
    color: var(--gold-soft);
    text-shadow: 0 0 30px rgba(201, 168, 76, 0.6);
    line-height: 1.3; opacity: 0;
    will-change: opacity, transform;
  }
  .txt-prompt { font-size: clamp(1.5rem, 4vw, 2.6rem); }
  .txt-date {
    font-family: '4 Privet Drive', 'Wulkan Display', Georgia, serif;
    font-size: clamp(1.52rem, 6.4vw, 2.72rem);   /* -20 % */
    text-transform: uppercase;            /* V2 : message révélé tout en capitales */
    color: #fff3d6;                       /* cœur clair chaud */
    /* Halo lumineux doré -> orangé (effet "incandescent" de la capture) */
    text-shadow:
      0 0 6px rgba(255, 240, 200, 0.95),
      0 0 14px rgba(255, 203, 110, 0.9),
      0 0 28px rgba(255, 168, 60, 0.8),
      0 0 52px rgba(255, 140, 30, 0.6),
      0 0 90px rgba(255, 120, 0, 0.4);
  }
  /* Desktop : +20 % sur le message révélé */
  @media (hover: hover) and (pointer: fine) {
    .txt-date { font-size: clamp(1.82rem, 7.7vw, 3.26rem); }
  }
  .txt-date .hour { display: inline-block; margin-top: 0.5rem; font-size: 1.2em; letter-spacing: 0.08em; }

  /* Lettres magiques : apparition avec dance, disparition par fondu du conteneur */
  .txt-date .ltr { display: inline-block; opacity: 0; }
  .txt-date .ltr.on {
    animation: ltrReveal 0.75s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    animation-delay: calc(var(--i) * 38ms);
  }
  /* NB : pas de filter:blur par lettre -> évite l'éviction de couches GPU
     (lettres qui disparaissent) sur Android. La "danse" reste via transform. */
  @keyframes ltrReveal {
    0%  { opacity: 0;
          transform: translateY(calc(sin(var(--i) * 89deg) * 22px + 18px))
                     translateX(calc(cos(var(--i) * 137deg) * 14px))
                     rotate(calc(sin(var(--i) * 233deg) * 20deg))
                     scale(0.65); }
    25% { opacity: 0.9;
          transform: translateY(calc(sin(var(--i) * 89deg) * -9px - 7px))
                     translateX(calc(cos(var(--i) * 137deg) * -6px))
                     rotate(calc(sin(var(--i) * 233deg) * -9deg))
                     scale(1.08); }
    52% { transform: translateY(calc(sin(var(--i) * 89deg) * 5px))
                     translateX(calc(cos(var(--i) * 137deg) * 3px))
                     rotate(calc(sin(var(--i) * 233deg) * 4deg))
                     scale(0.96); }
    76% { transform: translateY(calc(sin(var(--i) * 89deg) * -2px))
                     translateX(0px)
                     rotate(calc(sin(var(--i) * 233deg) * -1deg))
                     scale(1.01); }
    100%{ opacity: 1;
          transform: translateY(0) translateX(0) rotate(0deg) scale(1); }
  }

  /* "Le compte à rebours..." : petit texte en bas, à la place du bouton */
  .txt-final {
    align-self: end;
    padding-bottom: 10vh;
    font-size: clamp(0.9rem, 2.4vw, 1.3rem);
    color: var(--gold-soft);
    text-shadow: none;
    line-height: 1.65;
  }

  /* Texte de transition ciel → forêt */
  .trans-text {
    position: absolute; inset: 0; z-index: 10;
    display: grid; place-items: center;
    text-align: center; pointer-events: none;
    opacity: 0; will-change: opacity, transform;
  }
  .trans-text h2 { font-size: clamp(2rem, 5.5vw, 3.8rem); letter-spacing: 0.06em; }


  /* ============ Barre de progression (clic maintenu) ============ */
  #charge-bar {
    position: fixed; top: 0; left: 0; height: 7px; width: 0%;
    background: linear-gradient(90deg, var(--gold) 0%, var(--gold-soft) 100%);
    z-index: 9997; opacity: 0; pointer-events: none;
    border-radius: 0 4px 4px 0;
    box-shadow: 0 0 10px rgba(201,168,76,0.55), 0 0 4px rgba(230,200,121,0.4);
  }
</style>
</head>
<body>

<!-- Barre de bascule V1/V2 (TEMPORAIRE — à retirer une fois une version validée) -->
<nav id="version-switch" aria-label="Choix de version">
  <a href="./" class="vs-btn">V1</a>
  <a href="./v2.html" class="vs-btn vs-active">V2</a>
  <a href="./v3.html" class="vs-btn">V3</a>
</nav>

<canvas id="particles"></canvas>
<div id="charge-bar"></div>

<main class="stage-fixed">
  <div class="bgwrap">
    <div class="bg ciel"></div>
    <div class="bg nuages"></div>
    <div class="bg foret f3"></div>
    <div class="bg foret f2"></div>
    <div class="bg foret f1"></div>
    <div class="veil"></div>
    <canvas id="ff-canvas"></canvas>
  </div>

  <div class="sky-content">
    <img class="logo" src="IMG/logo_Picard.png" alt="Picard" draggable="false">
    <h1 class="invite-line">vous invite</h1>
    <picture>
      <!-- Tactile (mobile) : "cliquez" ; sinon (desktop, scroll) : "scrollez" -->
      <source media="(hover: none) and (pointer: coarse)" srcset="IMG/cliquez.png">
      <img id="cliquez-badge" class="scroll-badge" src="IMG/scroll.png" alt="Commencer l'aventure" draggable="false">
    </picture>
  </div>

  <p class="draw-hint">Dessinez sur l'écran<br>pour révéler votre magie</p>

  <div class="trans-text">
    <h2>à un nouveau<br>rendez-vous</h2>
  </div>

  <div class="forest-stage">
    <div class="orbe-wrap"><div class="orbe-spin"><picture><source srcset="IMG/ORBES.webp" type="image/webp"><img src="IMG/ORBES.webp" alt="" draggable="false"></picture></div></div>
    <p class="txt txt-prompt">Cliquez et<br>maintenez<br>pour révéler</p>
    <p class="txt txt-date">Rendez-vous<br>sur la Bon'App,<br>le 31 Août 2026,<br><span class="hour">11:11</span></p>
    <p class="txt txt-final">
      Le compte à rebours est lancé !<br>Soyez prêts !
    </p>
  </div>


</main>

<div class="scroll-driver" aria-hidden="true"></div>

<script>
(function () {
  "use strict";

  /* ============================================================
     1. PARTICLE EMITTER
     ============================================================ */
  // Empêche le navigateur de restaurer la position de scroll au rechargement
  if ('scrollRestoration' in history) history.scrollRestoration = 'manual';
  window.scrollTo(0, 0);

  const canvas = document.getElementById('particles');
  const ctx = canvas.getContext('2d');
  const ffCanvas = document.getElementById('ff-canvas');
  const ffCtx = ffCanvas.getContext('2d');

  const hasHover = window.matchMedia('(hover: hover) and (pointer: fine)').matches;
  if (hasHover) document.body.classList.add('custom-cursor');

  let DPR = Math.min(window.devicePixelRatio || 1, 2);
  function resizeCanvas() {
    DPR = Math.min(window.devicePixelRatio || 1, 2);
    const w = window.innerWidth, h = window.innerHeight;
    canvas.width = Math.floor(w * DPR); canvas.height = Math.floor(h * DPR);
    canvas.style.width = w + 'px'; canvas.style.height = h + 'px';
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    ffCanvas.width = Math.floor(w * DPR); ffCanvas.height = Math.floor(h * DPR);
    ffCanvas.style.width = w + 'px'; ffCanvas.style.height = h + 'px';
    ffCtx.setTransform(DPR, 0, 0, DPR, 0, 0);
  }
  resizeCanvas();

  // size 1.5 = poussière fine (vs 3 = grosses paillettes)
  const PARAMS = { density: 3, size: 1.5, speed: 1.2, decay: 0.015, gravity: 0.04, wiggle: 2, halo: 0, step: 4 };
  const COLORS = ['#ffd700','#ffed4a','#fff0a0','#f5c518','#ffe680','#ffc200','#fffbe6','#ffffff'];
  const particles = [];

  // mult : multiplicateur de densité (0.4 = trail léger, 3.5 = clic maintenu)
  const MAX_PARTICLES = 600;  // borne le coût de rendu (machines lentes)
  function spawn(x, y, mult) {
    const n = Math.max(1, Math.round(PARAMS.density * (mult || 1)));
    // Au plafond : on recycle les plus anciennes (déjà en train de mourir) au lieu
    // de couper l'émission -> le nuage reste plein au clic maintenu, sans cassure.
    if (particles.length + n > MAX_PARTICLES) {
      particles.splice(0, particles.length + n - MAX_PARTICLES);
    }
    for (let i = 0; i < n; i++) {
      const angle = Math.random() * Math.PI * 2;
      const spd = PARAMS.speed * (0.4 + Math.random() * 1.1);
      particles.push({
        x: x, y: y, vx: Math.cos(angle) * spd, vy: Math.sin(angle) * spd,
        r: PARAMS.size * (0.5 + Math.random()) * (hasHover ? 1 : 0.5), life: 1,
        color: COLORS[(Math.random() * COLORS.length) | 0],
        wFreq: 0.05 + Math.random() * 0.15, wPhase: Math.random() * Math.PI * 2, age: 0
      });
    }
  }

  let pressed = false;
  let lastX = 0, lastY = 0;
  let cursorX = -100, cursorY = -100, cursorVisible = false;
  let firstMove = true; // évite un spawn de (0,0) au premier mousemove

  function emitTo(x, y, mult) {
    const dx = x - lastX, dy = y - lastY;
    const dist = Math.hypot(dx, dy);
    if (dist >= PARAMS.step) {
      const steps = Math.floor(dist / PARAMS.step);
      for (let i = 1; i <= steps; i++) { const t = i / steps; spawn(lastX + dx * t, lastY + dy * t, mult || 1); }
      lastX = x; lastY = y;
    }
  }
  function pressStart(x, y) { pressed = true; lastX = x; lastY = y; spawn(x, y, 1); }
  function pressEnd() { pressed = false; }

  window.addEventListener('mousedown', function (e) { pressStart(e.clientX, e.clientY); });
  window.addEventListener('mousemove', function (e) {
    cursorX = e.clientX; cursorY = e.clientY; cursorVisible = true;
    // Premier mouvement : initialise lastX/Y sans émettre (évite le spray de (0,0))
    if (firstMove) { firstMove = false; lastX = e.clientX; lastY = e.clientY; return; }
    if (hasHover) {
      // Desktop : trail léger en permanence, plus dense au clic maintenu
      emitTo(e.clientX, e.clientY, pressed ? 1.8 : 0.4);
    } else if (pressed) {
      emitTo(e.clientX, e.clientY, 1);
    }
  });
  window.addEventListener('mouseup', pressEnd);

  // V2 — MOBILE : ciel figé, la descente est pilotée par le clic sur le badge.
  // On bloque le touchmove (défilement) mais jamais le touchstart (sinon les taps
  // sur la barre V1/V2/V3 + badge sont avalés). DESKTOP (hasHover) : on ne bloque
  // rien -> scroll libre identique à V1.
  function isInteractive(t) { return t && t.closest && t.closest('#version-switch, .scroll-badge'); }
  window.addEventListener('touchstart', function (e) {
    if (isInteractive(e.target)) return;
    const t = e.touches[0];
    pressStart(t.clientX, t.clientY);
  }, { passive: true });
  window.addEventListener('touchmove', function (e) {
    if (isInteractive(e.target)) return;
    const t = e.touches[0];
    emitTo(t.clientX, t.clientY, 1.8);
    if (!hasHover) e.preventDefault();   // verrou de scroll : mobile uniquement
  }, { passive: false });
  window.addEventListener('touchend', pressEnd, { passive: true });


  /* ============================================================
     2. SCROLL : descente (parallaxe d'arrivée) puis décor figé
     ============================================================ */
  const ciel    = document.querySelector('.ciel');
  const nuages  = document.querySelector('.nuages');
  const f1 = document.querySelector('.f1');
  const f2 = document.querySelector('.f2');
  const f3 = document.querySelector('.f3');
  const skyContent = document.querySelector('.sky-content');
  const drawHint   = document.querySelector('.draw-hint');
  const skyBadge   = (function(){ const i = document.getElementById('cliquez-badge'); return i && i.parentElement; })(); // <picture> (l'img a une anim CSS qui écrase style.opacity)

  const SETTLE_AT = 0.72;   // forêt en place à 72% de la descente, figée ensuite

  let arrive = 0;          // 0 = en haut (ciel), 1 = forêt posée
  let revealActive = false;
  let forestSettled = false;
  let autoScrollTimer = null;
  let returningToTop = false;  // empêche l'auto-scroll pendant le retour "Recommencer"
  let autoPlaying = false;     // V2 : descente automatique en cours (clic sur le badge)
  let v2Progress = 0;          // V2 : progression 0->1 pilotée par l'auto-scroll (pas le scroll réel)

  function clamp(v, a, b) { return v < a ? a : v > b ? b : v; }

  let ticking = false;
  function onScroll() { if (!ticking) { requestAnimationFrame(updateScroll); ticking = true; } }

  function updateScroll() {
    const vh = window.innerHeight;
    const maxScroll = (document.documentElement.scrollHeight - vh) || 1;
    // DESKTOP : scroll réel (comme V1). MOBILE : progression virtuelle (auto-scroll).
    const p = hasHover
      ? clamp((window.scrollY || window.pageYOffset) / maxScroll, 0, 1)
      : clamp(v2Progress, 0, 1);
    arrive = completed ? 1 : clamp(p / SETTLE_AT, 0, 1);

    // Retour "Recommencer" terminé dès qu'on est près du haut
    if (p < 0.02) returningToTop = false;

    // Desktop : rattrape le scroll résiduel (28 %) une fois la forêt posée, comme V1.
    // Mobile : pas de scroll réel, rien à rattraper.
    if (arrive >= 1 && !forestSettled && !returningToTop) {
      forestSettled = true;
      if (hasHover) {
        clearTimeout(autoScrollTimer);
        autoScrollTimer = setTimeout(function () {
          window.scrollTo({ top: document.documentElement.scrollHeight, behavior: 'smooth' });
        }, 250);
      }
    }

    // Ciel : léger drift (fond lointain -> bouge le moins)
    ciel.style.transform = 'translateY(' + (-arrive * vh * 0.12).toFixed(1) + 'px) scale(1.05)';

    // Nuage : plus bas au départ sur mobile (0.65) vs desktop (0.42)
    const nuageStart = hasHover ? 0.42 : 0.65;
    nuages.style.transform = 'translateY(' + ((nuageStart - arrive * 1.75) * vh).toFixed(1) + 'px)';

    // Contenu ciel : MONTE et sort par le haut, sans fondu d'opacité
    skyContent.style.transform = 'translateY(' + (-arrive * vh * 1.25).toFixed(1) + 'px)';

    // Phrase d'invite : visible au ciel, disparaît dès qu'on amorce la descente
    if (drawHint) drawHint.style.opacity = clamp(1 - arrive / 0.18, 0, 1).toFixed(3);

    // V2 : le badge "scrollez/cliquez" disparaît dès qu'on amorce (scroll/clic)
    if (skyBadge) skyBadge.style.opacity = clamp(1 - arrive / 0.08, 0, 1).toFixed(3);

    // Texte de transition : positionné entre le ciel et l'orbe. On tombe dessus
    // en scrollant, puis il remonte naturellement (passage unique, défilement
    // linéaire). Hors écran aux extrêmes -> pas besoin de fondu d'opacité.
    transText.style.opacity = '1';
    transText.style.transform = 'translateY(' + ((0.9 - arrive * 1.95) * vh).toFixed(1) + 'px)';

    // Forêt : chaque couche = image entière ancrée en bas, montée par translateY.
    // fh = hauteur rendue de l'image (pleine largeur). Travel ≥ fh → couche
    // totalement hors écran (bas) à arrive=0 ; à arrive=1 → 0 (sol ancré en bas).
    // Travels différenciés → parallaxe (le 1er plan se déplace le plus).
    const fh = window.innerWidth * 2383 / 1920;
    f3.style.transform = 'translateY(' + ((1 - arrive) * fh * 1.00).toFixed(1) + 'px)';
    f2.style.transform = 'translateY(' + ((1 - arrive) * fh * 1.15).toFixed(1) + 'px)';
    f1.style.transform = 'translateY(' + ((1 - arrive) * fh * 1.32).toFixed(1) + 'px)';

    ticking = false;
  }
  window.addEventListener('scroll', onScroll, { passive: true });

  /* ============================================================
     2bis. V2 : descente automatique au clic sur le badge "cliquez"
     Le ciel est figé ; un clic lance un scroll auto lent (easing) qui
     rejoue tout le parallax (texte de transition inclus) jusqu'à la forêt.
     ============================================================ */
  function startDescent() {
    if (hasHover) return;                            // desktop : scroll libre (comme V1)
    if (autoPlaying || v2Progress > 0.02) return;   // une seule fois, depuis le ciel
    autoPlaying = true;
    const dur = 6800;                                // long -> vitesse max faible (message lisible)
    const t0 = performance.now();
    // easeInOutSine : ease-in puis ease-out, pic de vitesse doux au centre.
    function ease(t) { return -(Math.cos(Math.PI * t) - 1) / 2; }
    function step(now) {
      const t = Math.min((now - t0) / dur, 1);
      v2Progress = ease(t) * SETTLE_AT;              // arrive = v2Progress / SETTLE_AT
      updateScroll();
      if (t < 1) requestAnimationFrame(step);
      else { v2Progress = SETTLE_AT; autoPlaying = false; updateScroll(); }
    }
    requestAnimationFrame(step);
  }
  const cliquezBadge = document.getElementById('cliquez-badge');
  if (cliquezBadge) cliquezBadge.addEventListener('click', startDescent);


  /* ============================================================
     3. RÉVÉLATION : clic maintenu -> orbe grossit, 3 textes, flou
     ============================================================ */
  const bgwrap    = document.querySelector('.bgwrap');
  const veil      = document.querySelector('.veil');
  const orbeWrap  = document.querySelector('.orbe-wrap');
  const txtPrompt = document.querySelector('.txt-prompt');
  const txtDate   = document.querySelector('.txt-date');
  const txtFinal  = document.querySelector('.txt-final');
  const transText = document.querySelector('.trans-text');
  const chargeBar = document.getElementById('charge-bar');

  /* Découpe chaque caractère non-espace en <span class="ltr" style="--i:N"> */
  function splitLetters(el) {
    let idx = 0;
    function walk(node) {
      if (node.nodeType === 3) {
        const text = node.textContent;
        const frag = document.createDocumentFragment();
        for (let i = 0; i < text.length; i++) {
          const ch = text[i];
          if (/\S/.test(ch)) {
            const s = document.createElement('span');
            s.className = 'ltr';
            s.style.setProperty('--i', idx++);
            s.textContent = ch;
            frag.appendChild(s);
          } else {
            frag.appendChild(document.createTextNode(ch));
          }
        }
        node.parentNode.replaceChild(frag, node);
      } else if (node.nodeType === 1) {
        Array.from(node.childNodes).forEach(walk);
      }
    }
    walk(el);
  }
  splitLetters(txtDate);

  let charge = 0;
  let completed = false;
  let barVisible = false;
  let ltrState = 'hidden'; // 'hidden' | 'showing' | 'visible'
  let ltrTimer  = null;
  const CHARGE_UP = 0.009;
  const CHARGE_DOWN = 0.02;
  const MAX_BLUR = 14;



  /* ============================================================
     LUCIOLES — flottent doucement au-dessus du sol de la forêt
     ============================================================ */
  const NUM_FF = 13;
  const fireflies = [];

  function makeFirefly() {
    const vw = window.innerWidth;
    const vh = window.innerHeight;
    // Mobile : taille réduite, positionnées plus bas (près du sol)
    const szMult  = hasHover ? 1   : 0.42;
    const yBase   = hasHover ? 0.58 : 0.72;
    const yRange  = hasHover ? 0.34 : 0.20;
    return {
      x: vw * (0.04 + Math.random() * 0.92),
      baseY: vh * (yBase + Math.random() * yRange),
      vx: (Math.random() - 0.5) * 0.35,
      phaseY: Math.random() * Math.PI * 2,
      freqY: 0.004 + Math.random() * 0.006,
      ampY: (hasHover ? 10 : 6) + Math.random() * (hasHover ? 22 : 12),
      phaseOp: Math.random() * Math.PI * 2,
      freqOp: 0.008 + Math.random() * 0.012,
      size: (1.6 + Math.random() * 1.8) * szMult,
    };
  }

  function initFireflies() {
    fireflies.length = 0;
    for (let i = 0; i < NUM_FF; i++) fireflies.push(makeFirefly());
  }
  initFireflies();

  function drawFireflies() {
    ffCtx.clearRect(0, 0, window.innerWidth, window.innerHeight);
    if (arrive < 0.84) return;

    // Fade global : apparaissent entre 0.84 et 1
    const globalFade = clamp((arrive - 0.84) / 0.16, 0, 1);
    // "Arrivent du bas" avec la forêt : décalage Y qui se résorbe
    const ffSettle = clamp((arrive - 0.84) / 0.16, 0, 1);
    const riseOffset = (1 - ffSettle) * window.innerHeight * 0.55;
    const vw = window.innerWidth;

    for (let i = 0; i < fireflies.length; i++) {
      const ff = fireflies[i];
      ff.phaseY  += ff.freqY;
      ff.phaseOp += ff.freqOp;
      ff.x += ff.vx;
      if (ff.x < -10) ff.x = vw + 5;
      if (ff.x > vw + 10) ff.x = -5;

      const bobY = Math.sin(ff.phaseY) * ff.ampY;
      const y = ff.baseY + bobY + riseOffset;
      const pulse = 0.25 + 0.75 * (0.5 + 0.5 * Math.sin(ff.phaseOp));
      const alpha = globalFade * pulse;

      // Halo or doux (couleur orbe)
      ffCtx.globalAlpha = alpha * 0.2;
      ffCtx.shadowBlur = 20; ffCtx.shadowColor = '#f5c518';
      ffCtx.beginPath();
      ffCtx.arc(ff.x, y, ff.size * 4.5, 0, Math.PI * 2);
      ffCtx.fillStyle = '#f5c518'; ffCtx.fill();

      // Cœur brillant or/blanc
      ffCtx.globalAlpha = alpha;
      ffCtx.shadowBlur = 8; ffCtx.shadowColor = '#ffe680';
      ffCtx.beginPath();
      ffCtx.arc(ff.x, y, ff.size, 0, Math.PI * 2);
      ffCtx.fillStyle = '#fff0a0'; ffCtx.fill();
    }
    ffCtx.globalAlpha = 1; ffCtx.shadowBlur = 0;
  }


  window.addEventListener('resize', function () {
    resizeCanvas(); updateScroll(); initFireflies();
  });

  function reveal() {
    // L'orbe apparaît quand la forêt se pose
    const orbeIn = clamp((arrive - 0.55) / 0.45, 0, 1);
    revealActive = arrive > 0.98 && !completed;

    if (revealActive && pressed) {
      charge = clamp(charge + CHARGE_UP, 0, 1);
    } else if (!completed) {
      charge = clamp(charge - CHARGE_DOWN, 0, 1);
    }

    // Flou des décors + voile bleu, pilotés par la charge
    bgwrap.style.filter = charge > 0.001 ? 'blur(' + (charge * MAX_BLUR).toFixed(2) + 'px)' : 'none';
    veil.style.opacity = (charge * 0.55).toFixed(3);

    // Orbe + prompt : arrivent du bas avec la forêt
    const orbeRise = (1 - orbeIn) * window.innerHeight * 0.70;
    orbeWrap.style.opacity = orbeIn.toFixed(3);
    orbeWrap.style.transform = 'translateY(' + orbeRise.toFixed(1) + 'px) scale(' + (0.82 + charge * 1.7).toFixed(3) + ')';

    if (!completed) {
      const pOut = clamp(charge / 0.22, 0, 1);
      txtPrompt.style.opacity = (orbeIn * (1 - pOut)).toFixed(3);
      txtPrompt.style.transform = 'translateY(' + (orbeRise + pOut * -28).toFixed(1) + 'px)';

      // Révélation lettres (charge monte ≥ 0.18)
      if (charge >= 0.18 && ltrState === 'hidden') {
        ltrState = 'showing';
        clearTimeout(ltrTimer);
        txtDate.style.transition = '';
        txtDate.style.opacity = '1';
        const ltrs = txtDate.querySelectorAll('.ltr');
        ltrs.forEach(function (s) { s.classList.remove('on'); });
        void txtDate.offsetWidth; // force reflow → redémarre l'animation
        ltrs.forEach(function (s) { s.classList.add('on'); });
        // Marquer comme entièrement visible après le dernier stagger
        ltrTimer = setTimeout(function () {
          if (ltrState === 'showing') ltrState = 'visible';
        }, (ltrs.length - 1) * 38 + 750);
      }
      // Disparition si relâché (charge < 0.10) : fondu du conteneur, sans flash
      if (charge < 0.10 && (ltrState === 'showing' || ltrState === 'visible')) {
        ltrState = 'hidden';
        clearTimeout(ltrTimer);
        txtDate.style.transition = 'opacity 0.35s ease-out';
        txtDate.style.opacity = '0';
        ltrTimer = setTimeout(function () {
          txtDate.querySelectorAll('.ltr').forEach(function (s) { s.classList.remove('on'); });
          txtDate.style.transition = '';
        }, 400);
      }

      txtFinal.style.opacity = '0';
    }

    // Barre de progression
    if (arrive >= 0.98 && !completed) {
      if (!barVisible) {
        barVisible = true;
        chargeBar.style.transition = 'none';
        chargeBar.style.opacity = '1';
      }
      chargeBar.style.width = (charge * 100).toFixed(1) + '%';
    } else if (completed) {
      chargeBar.style.transition = 'opacity 1.2s ease';
      chargeBar.style.opacity = '0';
    } else {
      chargeBar.style.opacity = '0'; barVisible = false;
    }

    if (charge >= 1 && !completed) {
      completed = true; revealActive = false;
      txtPrompt.style.opacity = '0';
      // txtDate reste visible et fixe
      txtFinal.style.transition = 'opacity 1s ease 0.35s';
      txtFinal.style.opacity = '1';
    }
  }


  /* ============================================================
     4. RENDER LOOP
     ============================================================ */
  function render() {
    ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);

    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.age++;
      p.vy += PARAMS.gravity;
      const wiggleX = Math.sin(p.age * p.wFreq + p.wPhase) * PARAMS.wiggle * 0.1;
      p.x += p.vx + wiggleX; p.y += p.vy; p.life -= PARAMS.decay;
      if (p.life <= 0) { particles.splice(i, 1); continue; }
      const radius = Math.max(0, p.r * p.life);
      ctx.globalAlpha = p.life;
      if (PARAMS.halo > 0) { ctx.shadowBlur = PARAMS.halo; ctx.shadowColor = p.color; }
      ctx.beginPath();
      ctx.arc(p.x, p.y, radius, 0, Math.PI * 2);
      ctx.fillStyle = p.color; ctx.fill();
    }
    ctx.globalAlpha = 1; ctx.shadowBlur = 0;

    if (hasHover && cursorVisible) {
      ctx.beginPath();
      ctx.arc(cursorX, cursorY, 5, 0, Math.PI * 2);
      ctx.strokeStyle = 'rgba(201,168,76,0.7)';
      ctx.lineWidth = 1; ctx.stroke();
    }

    drawFireflies();
    reveal();
    requestAnimationFrame(render);
  }

  updateScroll();
  requestAnimationFrame(render);
})();
</script>
</body>
</html>
