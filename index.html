<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#070b1e">
<title>Picard vous invite</title>
<style>
  /* ---------- Custom display font (servie en local) ---------- */
  @font-face {
    font-family: 'Wulkan Display';
    src: url('fonts/wulkan_display_regular/wulkan_display_regular-webfont.woff2') format('woff2'),
         url('fonts/wulkan_display_regular/wulkan_display_regular-webfont.woff') format('woff');
    font-weight: normal;
    font-style: normal;
    font-display: swap;
  }

  :root {
    --bg-night: #0a0e2a;
    --bg-deep: #070b1e;
    --gold: #c9a84c;
    --gold-soft: #e6c879;
    --body: #c8c8e0;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html { scroll-behavior: smooth; }

  body {
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    color: var(--body);
    background: var(--bg-deep);
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  @media (hover: hover) and (pointer: fine) {
    body.custom-cursor { cursor: none; }
  }

  h1, h2 {
    font-family: 'Wulkan Display', Georgia, serif;
    color: var(--gold);
    font-weight: normal;
    line-height: 1.12;
    text-shadow: 0 0 40px rgba(201, 168, 76, 0.35);
  }

  /* ============ Particle canvas ============ */
  #particles {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 9999;
  }

  /* ============ Generic layers ============ */
  .scene {
    position: relative;
    min-height: 100svh;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .layer {
    position: absolute;
    inset: -6%;
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    will-change: transform;
    pointer-events: none;
  }

  /* ============ Scene 1 : Hero (ciel) ============ */
  #hero { background: #060a1c; }
  .bg-ciel   { background-image: url('IMG/Ciel.png'); }
  .bg-nuages {
    background-image: url('IMG/Nuages.png');
    background-position: center bottom;
    inset: auto -6% -6% -6%;
    height: 80%;
  }
  .hero-content {
    position: relative;
    z-index: 3;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 8vw;
  }
  .logo {
    width: clamp(90px, 14vw, 150px);
    height: auto;
    filter: drop-shadow(0 0 28px rgba(201, 168, 76, 0.45));
    margin-bottom: 1.6rem;
  }
  .invite-line {
    font-size: clamp(2rem, 6vw, 3.6rem);
    letter-spacing: 0.04em;
    margin-bottom: 3.5rem;
  }
  .scroll-badge {
    width: clamp(130px, 17vw, 190px);
    height: auto;
    animation: floaty 3.4s ease-in-out infinite;
  }
  @keyframes floaty {
    0%, 100% { transform: translateY(0); opacity: 0.9; }
    50% { transform: translateY(10px); opacity: 1; }
  }

  /* ============ Scene 2+3 : Forêt + révélation ============ */
  /* Tall section, sticky stage pinned while scrolling -> depth + reveal */
  #stage {
    position: relative;
    height: 280svh;          /* scroll runway for the beats */
    background: #04060f;
  }
  .stage-sticky {
    position: sticky;
    top: 0;
    height: 100svh;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .foret { position: absolute; inset: -8%; background-size: cover; background-position: center bottom; will-change: transform; pointer-events: none; }
  .f3 { background-image: url('IMG/foret-3.png'); }
  .f2 { background-image: url('IMG/foret-2.png'); }
  .f1 { background-image: url('IMG/foret-1.png'); }

  .stage-content {
    position: relative;
    z-index: 4;
    width: 100%;
    height: 100%;
    display: grid;
    place-items: center;
    text-align: center;
    user-select: none;
    -webkit-user-select: none;
  }
  /* All beats share the same optical centre */
  .stage-content > * { grid-area: 1 / 1; }

  .beat-nouveau {
    font-size: clamp(2rem, 6vw, 3.8rem);
    transform: translateY(-30vh);
    will-change: opacity;
  }

  .orbe-wrap {
    position: relative;
    width: clamp(280px, 62vw, 620px);
    aspect-ratio: 1 / 1;
    display: grid;
    place-items: center;
  }
  .orbe-scale {
    grid-area: 1 / 1;
    width: 100%; height: 100%;
    display: grid; place-items: center;
    will-change: transform, opacity;
  }
  .orbe-spin {
    width: 100%; height: 100%;
    animation: spin 26s linear infinite;
  }
  .orbe-spin img {
    width: 100%; height: 100%;
    object-fit: contain;
    filter: drop-shadow(0 0 30px rgba(230, 200, 121, 0.35));
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Prompt + date occupy the orbe centre, cross-fade via JS */
  .reveal-prompt, .reveal-date {
    grid-area: 1 / 1;
    z-index: 2;
    font-family: 'Wulkan Display', Georgia, serif;
    color: var(--gold-soft);
    text-shadow: 0 0 26px rgba(201, 168, 76, 0.5);
    pointer-events: none;
  }
  .reveal-prompt {
    font-size: clamp(1.5rem, 4.2vw, 2.6rem);
    line-height: 1.25;
    will-change: opacity;
  }
  .reveal-date {
    font-size: clamp(1.25rem, 3.4vw, 2.1rem);
    line-height: 1.4;
    opacity: 0;
    will-change: opacity, transform;
  }
  .reveal-date .hour {
    display: inline-block;
    margin-top: 0.5rem;
    font-size: 1.35em;
    letter-spacing: 0.08em;
  }

  /* ============ Scene 4 : Final ============ */
  #final {
    background: #04060f;
    opacity: 0;
    visibility: hidden;
    transition: opacity 1.2s ease;
  }
  #final.show { opacity: 1; visibility: visible; }
  .final-bg {
    background-image: url('IMG/foret-3.png');
    background-position: center bottom;
    opacity: 0.6;
    filter: brightness(0.55) saturate(1.1) blur(2px);
    transform: scale(1.08);
  }
  .final-orbe {
    position: absolute;
    z-index: 1;
    width: clamp(320px, 70vw, 720px);
    aspect-ratio: 1 / 1;
    object-fit: contain;
    opacity: 0.22;
    filter: drop-shadow(0 0 40px rgba(230, 200, 121, 0.4));
    animation: spin 40s linear infinite;
    pointer-events: none;
  }
  .final-veil {
    position: absolute; inset: 0; z-index: 2;
    background: radial-gradient(circle at 50% 45%, rgba(8,12,30,0.15), rgba(4,6,15,0.7) 78%);
    pointer-events: none;
  }
  .final-content {
    position: relative;
    z-index: 3;
    text-align: center;
    padding: 0 8vw;
  }
  .final-small {
    font-family: 'Wulkan Display', Georgia, serif;
    color: var(--gold-soft);
    font-size: clamp(1.1rem, 3vw, 1.7rem);
    margin-bottom: 1.2rem;
    letter-spacing: 0.02em;
  }
  .final-big {
    font-size: clamp(2.6rem, 9vw, 5.5rem);
    margin-bottom: 3rem;
  }
  .fermer {
    font-family: 'Wulkan Display', Georgia, serif;
    background: transparent;
    color: var(--gold);
    border: 1px solid var(--gold);
    border-radius: 999px;
    padding: 0.8rem 2.6rem;
    font-size: 1rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.35s ease, color 0.35s ease;
  }
  .fermer:hover { background: var(--gold); color: var(--bg-deep); }

  @media (max-width: 768px) {
    #stage { height: 260svh; }
  }
</style>
</head>
<body>

<canvas id="particles"></canvas>

<!-- ===== Scene 1 : Hero (ciel) ===== -->
<section id="hero" class="scene">
  <div class="layer bg-ciel"   data-px="0.18"></div>
  <div class="layer bg-nuages" data-px="0.42"></div>
  <div class="hero-content">
    <img class="logo" src="IMG/logo_Picard.png" alt="Picard">
    <h1 class="invite-line">vous invite</h1>
    <img class="scroll-badge" src="IMG/scroll.png" alt="Scrollez pour commencer l'aventure">
  </div>
</section>

<!-- ===== Scene 2+3 : Forêt + révélation ===== -->
<section id="stage">
  <div class="stage-sticky">
    <div class="foret f3" data-depth="0.04"></div>
    <div class="foret f2" data-depth="0.10"></div>
    <div class="foret f1" data-depth="0.18"></div>
    <div class="stage-content">
      <h2 class="beat-nouveau">Un nouveau<br>rendez-vous</h2>
      <div class="orbe-wrap">
        <div class="orbe-scale">
          <div class="orbe-spin"><img src="IMG/ORBES.png" alt=""></div>
        </div>
        <p class="reveal-prompt">Cliquez et<br>maintenez<br>pour révéler</p>
        <p class="reveal-date">Rendez-vous<br>sur la Bon'App,<br>le 31 Août 2026,<br><span class="hour">11:11</span></p>
      </div>
    </div>
  </div>
</section>

<!-- ===== Scene 4 : Final ===== -->
<section id="final" class="scene">
  <div class="layer final-bg"></div>
  <img class="final-orbe" src="IMG/ORBES.png" alt="">
  <div class="final-veil"></div>
  <div class="final-content">
    <p class="final-small">Le compte à rebours est lancé !</p>
    <h2 class="final-big">Soyez<br>prêts !</h2>
    <button class="fermer" type="button">Fermer</button>
  </div>
</section>

<script>
(function () {
  "use strict";

  /* ============================================================
     1. PARTICLE EMITTER (gold sparkles on click / touch-hold)
     ============================================================ */
  const canvas = document.getElementById('particles');
  const ctx = canvas.getContext('2d');

  const hasHover = window.matchMedia('(hover: hover) and (pointer: fine)').matches;
  if (hasHover) document.body.classList.add('custom-cursor');

  let DPR = Math.min(window.devicePixelRatio || 1, 2);
  function resizeCanvas() {
    DPR = Math.min(window.devicePixelRatio || 1, 2);
    canvas.width = Math.floor(window.innerWidth * DPR);
    canvas.height = Math.floor(window.innerHeight * DPR);
    canvas.style.width = window.innerWidth + 'px';
    canvas.style.height = window.innerHeight + 'px';
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  }
  resizeCanvas();

  const PARAMS = {
    density: 5, size: 3, speed: 1.2, decay: 0.005,
    gravity: 0.04, wiggle: 2, halo: 0, step: 4
  };
  const COLORS = ['#ffd700','#ffed4a','#fff0a0','#f5c518','#ffe680','#ffc200','#fffbe6','#ffffff'];
  const particles = [];

  function spawn(x, y) {
    for (let i = 0; i < PARAMS.density; i++) {
      const angle = Math.random() * Math.PI * 2;
      const spd = PARAMS.speed * (0.4 + Math.random() * 1.1);
      particles.push({
        x: x, y: y,
        vx: Math.cos(angle) * spd, vy: Math.sin(angle) * spd,
        r: PARAMS.size * (0.5 + Math.random()),
        life: 1, color: COLORS[(Math.random() * COLORS.length) | 0],
        wFreq: 0.05 + Math.random() * 0.15, wPhase: Math.random() * Math.PI * 2, age: 0
      });
    }
  }

  let pressed = false;
  let lastX = 0, lastY = 0;
  let cursorX = -100, cursorY = -100, cursorVisible = false;

  function emitTo(x, y) {
    const dx = x - lastX, dy = y - lastY;
    const dist = Math.hypot(dx, dy);
    if (dist >= PARAMS.step) {
      const steps = Math.floor(dist / PARAMS.step);
      for (let i = 1; i <= steps; i++) {
        const t = i / steps;
        spawn(lastX + dx * t, lastY + dy * t);
      }
      lastX = x; lastY = y;
    }
  }

  function pressStart(x, y) { pressed = true; lastX = x; lastY = y; spawn(x, y); }
  function pressEnd() { pressed = false; }

  window.addEventListener('mousedown', function (e) { pressStart(e.clientX, e.clientY); });
  window.addEventListener('mousemove', function (e) {
    cursorX = e.clientX; cursorY = e.clientY; cursorVisible = true;
    if (pressed) emitTo(e.clientX, e.clientY);
  });
  window.addEventListener('mouseup', pressEnd);

  // Touch — preventDefault only while the reveal stage is active (else we'd block scroll)
  window.addEventListener('touchstart', function (e) {
    const t = e.touches[0];
    pressStart(t.clientX, t.clientY);
    if (revealActive) e.preventDefault();
  }, { passive: false });
  window.addEventListener('touchmove', function (e) {
    const t = e.touches[0];
    emitTo(t.clientX, t.clientY);
    if (revealActive) e.preventDefault();
  }, { passive: false });
  window.addEventListener('touchend', function (e) {
    pressEnd();
    if (revealActive) e.preventDefault();
  }, { passive: false });


  /* ============================================================
     2. SCROLL : parallax hero + forêt + beats
     ============================================================ */
  const ciel    = document.querySelector('.bg-ciel');
  const nuages  = document.querySelector('.bg-nuages');
  const heroPx  = [ciel, nuages];

  const stage      = document.getElementById('stage');
  const foretLayers= Array.prototype.slice.call(document.querySelectorAll('.foret[data-depth]'));
  const beatNouveau= document.querySelector('.beat-nouveau');
  const promptEl   = document.querySelector('.reveal-prompt');
  const orbeScale  = document.querySelector('.orbe-scale');

  let stageProgress = 0;   // 0..1 progress through the sticky runway
  let revealActive = false;

  function clamp(v, a, b) { return v < a ? a : v > b ? b : v; }

  let ticking = false;
  function onScroll() {
    if (!ticking) { requestAnimationFrame(updateScroll); ticking = true; }
  }
  function updateScroll() {
    const sy = window.scrollY || window.pageYOffset;
    const vh = window.innerHeight;

    // Hero parallax (simple, anchored at top of doc)
    for (let i = 0; i < heroPx.length; i++) {
      const el = heroPx[i];
      const sp = parseFloat(el.getAttribute('data-px')) || 0;
      el.style.transform = 'translateY(' + (sy * sp).toFixed(1) + 'px)';
    }

    // Stage progress (sticky runway)
    const top = stage.offsetTop;
    const runway = stage.offsetHeight - vh;
    stageProgress = clamp((sy - top) / (runway || 1), 0, 1);

    // Forest depth parallax (driven by progress so it reads while pinned)
    for (let i = 0; i < foretLayers.length; i++) {
      const el = foretLayers[i];
      const d = parseFloat(el.getAttribute('data-depth')) || 0;
      el.style.transform = 'translateY(' + (stageProgress * vh * -d).toFixed(1) + 'px) scale(' + (1 + d * 0.4) + ')';
    }

    // Beat 1 ("Un nouveau rendez-vous") fades out as we move into the climax
    beatNouveau.style.opacity = clamp(1 - stageProgress * 2.4, 0, 1);

    ticking = false;
  }
  window.addEventListener('scroll', onScroll, { passive: true });
  window.addEventListener('resize', function () { resizeCanvas(); updateScroll(); });


  /* ============================================================
     3. RÉVÉLATION : hold-to-charge
     ============================================================ */
  const dateEl  = document.querySelector('.reveal-date');
  const finalEl = document.getElementById('final');
  const fermer  = document.querySelector('.fermer');

  let charge = 0;          // 0..1
  let completed = false;
  const CHARGE_UP = 0.011; // ~1.5s to fill
  const CHARGE_DOWN = 0.022;

  fermer.addEventListener('click', function () {
    // Replay : reset and go back to the top
    completed = false;
    charge = 0;
    finalEl.classList.remove('show');
    window.scrollTo({ top: 0, behavior: 'smooth' });
  });

  function reveal() {
    if (completed) {
      finalEl.classList.add('show');
      finalEl.style.pointerEvents = 'auto';
    } else {
      finalEl.style.pointerEvents = 'none';
    }
    // Climax is "active" once the stage is well into its runway
    revealActive = stageProgress > 0.55 && !completed;

    if (revealActive && pressed) {
      charge = clamp(charge + CHARGE_UP, 0, 1);
    } else if (!completed) {
      charge = clamp(charge - CHARGE_DOWN, 0, 1);
    }

    // Climax visibility (orbe prominent + prompt visible) ramps in late
    const climax = clamp((stageProgress - 0.4) / 0.25, 0, 1);

    // Orbe forms with the climax (faint -> full), then grows with charge
    orbeScale.style.transform = 'scale(' + (0.78 + climax * 0.12 + charge * 0.4).toFixed(3) + ')';
    orbeScale.style.opacity = (0.28 + climax * 0.72).toFixed(3);

    // Prompt visible during climax, fades out as the date charges in
    promptEl.style.opacity = (climax * (1 - charge)).toFixed(3);

    // Date : opacity + size driven by charge
    dateEl.style.opacity = charge.toFixed(3);
    dateEl.style.transform = 'scale(' + (0.55 + charge * 0.45).toFixed(3) + ')';

    if (charge >= 1 && !completed) {
      completed = true;
      revealActive = false;
      // Unlock + bring the final scene into view
      setTimeout(function () {
        finalEl.classList.add('show');
        finalEl.style.pointerEvents = 'auto';
        finalEl.scrollIntoView({ behavior: 'smooth' });
      }, 650);
    }
  }


  /* ============================================================
     4. RENDER LOOP (particles + reveal state)
     ============================================================ */
  function render() {
    ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);

    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.age++;
      p.vy += PARAMS.gravity;
      const wiggleX = Math.sin(p.age * p.wFreq + p.wPhase) * PARAMS.wiggle * 0.1;
      p.x += p.vx + wiggleX;
      p.y += p.vy;
      p.life -= PARAMS.decay;
      if (p.life <= 0) { particles.splice(i, 1); continue; }

      const radius = Math.max(0, p.r * p.life);
      ctx.globalAlpha = p.life;
      if (PARAMS.halo > 0) { ctx.shadowBlur = PARAMS.halo; ctx.shadowColor = p.color; }
      ctx.beginPath();
      ctx.arc(p.x, p.y, radius, 0, Math.PI * 2);
      ctx.fillStyle = p.color;
      ctx.fill();
    }
    ctx.globalAlpha = 1;
    ctx.shadowBlur = 0;

    if (hasHover && cursorVisible) {
      ctx.beginPath();
      ctx.arc(cursorX, cursorY, 5, 0, Math.PI * 2);
      ctx.strokeStyle = 'rgba(201,168,76,0.7)';
      ctx.lineWidth = 1;
      ctx.stroke();
    }

    reveal();
    requestAnimationFrame(render);
  }

  updateScroll();
  requestAnimationFrame(render);
})();
</script>
</body>
</html>
