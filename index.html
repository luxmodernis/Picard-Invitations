<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#070b1e">
<title>Picard vous invite</title>
<style>
  /* ---------- Police display (servie en local) ---------- */
  @font-face {
    font-family: 'Wulkan Display';
    src: url('fonts/wulkan_display_regular/wulkan_display_regular-webfont.woff2') format('woff2'),
         url('fonts/wulkan_display_regular/wulkan_display_regular-webfont.woff') format('woff');
    font-weight: normal;
    font-style: normal;
    font-display: swap;
  }

  :root {
    --bg-deep: #04060f;
    --gold: #c9a84c;
    --gold-soft: #e6c879;
    --body: #c8c8e0;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }

  body {
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    color: var(--body);
    background: var(--bg-deep);
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
    /* Cliquer pour les paillettes ne doit jamais attraper texte / image */
    -webkit-user-select: none;
    -moz-user-select: none;
    user-select: none;
    -webkit-touch-callout: none;
  }
  img { -webkit-user-drag: none; user-select: none; pointer-events: none; }

  @media (hover: hover) and (pointer: fine) {
    body.custom-cursor { cursor: none; }
  }

  h1, h2 {
    font-family: 'Wulkan Display', Georgia, serif;
    color: var(--gold);
    font-weight: normal;
    line-height: 1.12;
    text-shadow: 0 0 40px rgba(201, 168, 76, 0.35);
  }

  /* ============ Particle canvas ============ */
  #particles {
    position: fixed; inset: 0;
    width: 100%; height: 100%;
    pointer-events: none; z-index: 9999;
  }

  /* Fonds plein écran : COVER centré -> remplit l'écran, cadrage propre */
  .bg {
    position: absolute; inset: 0;
    background-repeat: no-repeat;
    background-size: cover;
    background-position: center;
    will-change: transform;
    pointer-events: none;
  }

  /* ============ Écran 1 : Ciel ============ */
  #sky {
    position: relative;
    height: 100svh;
    overflow: hidden;
    background: #04060f;
  }
  .sky-ciel   { background-image: url('IMG/Ciel.png'); }
  .sky-nuages {
    background-image: url('IMG/Nuages.png');
    background-position: center 38%;
    z-index: 2;
  }
  .sky-content {
    position: absolute; inset: 0; z-index: 5;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center;
    pointer-events: none;
    will-change: opacity, transform;
  }
  .logo {
    width: clamp(90px, 11vw, 150px);
    height: auto;
    filter: drop-shadow(0 0 28px rgba(201, 168, 76, 0.45));
    margin-bottom: 2.2rem;
  }
  .invite-line {
    font-size: clamp(2rem, 5.5vw, 3.6rem);
    letter-spacing: 0.04em;
    margin-bottom: 3.2rem;
  }
  .scroll-badge {
    width: clamp(130px, 14vw, 185px);
    height: auto;
    animation: floaty 3.4s ease-in-out infinite;
  }
  @keyframes floaty {
    0%, 100% { transform: translateY(0); opacity: 0.9; }
    50% { transform: translateY(10px); opacity: 1; }
  }

  /* ============ Écran 2 : Forêt (arrivée parallax -> figée) ============ */
  #forest {
    position: relative;
    height: 200svh;            /* runway : arrivée parallax puis pin statique */
    background: #04060f;
  }
  .forest-pin {
    position: sticky; top: 0;
    height: 100svh;
    overflow: hidden;
  }
  .f3 { background-image: url('IMG/foret-3.png'); }
  .f2 { background-image: url('IMG/foret-2.png'); z-index: 2; }
  .f1 { background-image: url('IMG/foret-1.png'); z-index: 3; }

  .stage {
    position: absolute; inset: 0; z-index: 5;
    display: grid; place-items: center;
    text-align: center;
    pointer-events: none;
  }
  .stage > * { grid-area: 1 / 1; }

  .orbe-wrap {
    width: clamp(260px, 52vw, 560px);
    aspect-ratio: 1 / 1;
    display: grid; place-items: center;
    will-change: transform, opacity;
  }
  .orbe-spin {
    width: 100%; height: 100%;
    animation: spin 26s linear infinite;   /* sens inversé */
  }
  .orbe-spin img {
    width: 100%; height: 100%;
    object-fit: contain;
    filter: drop-shadow(0 0 30px rgba(230, 200, 121, 0.35));
  }
  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(-360deg); } }

  /* Les 3 textes : même centre, cross-fade + léger défilement vertical */
  .txt {
    grid-area: 1 / 1;
    z-index: 3;
    font-family: 'Wulkan Display', Georgia, serif;
    color: var(--gold-soft);
    text-shadow: 0 0 26px rgba(201, 168, 76, 0.55);
    line-height: 1.3;
    opacity: 0;
    will-change: opacity, transform;
  }
  .txt-prompt { font-size: clamp(1.5rem, 4vw, 2.6rem); }
  .txt-date   { font-size: clamp(1.25rem, 3.2vw, 2.05rem); }
  .txt-date .hour { display: inline-block; margin-top: 0.5rem; font-size: 1.35em; letter-spacing: 0.08em; }
  .txt-final .small {
    display: block;
    font-size: clamp(1rem, 2.6vw, 1.5rem);
    color: var(--gold-soft);
    margin-bottom: 0.9rem;
  }
  .txt-final .big {
    display: block;
    font-family: 'Wulkan Display', Georgia, serif;
    color: var(--gold);
    font-size: clamp(2.4rem, 7vw, 4.6rem);
    text-shadow: 0 0 40px rgba(201,168,76,0.4);
  }
  .replay {
    position: absolute;
    left: 50%; bottom: 7vh; transform: translateX(-50%);
    z-index: 6;
    font-family: 'Wulkan Display', Georgia, serif;
    background: transparent; color: var(--gold);
    border: 1px solid var(--gold); border-radius: 999px;
    padding: 0.7rem 2.2rem;
    font-size: 0.9rem; letter-spacing: 0.2em; text-transform: uppercase;
    cursor: pointer; pointer-events: auto;
    opacity: 0; visibility: hidden;
    transition: opacity 0.8s ease, background 0.35s ease, color 0.35s ease;
  }
  .replay.show { opacity: 1; visibility: visible; }
  .replay:hover { background: var(--gold); color: var(--bg-deep); }
</style>
</head>
<body>

<canvas id="particles"></canvas>

<!-- ===== Écran 1 : Ciel ===== -->
<section id="sky">
  <div class="bg sky-ciel"></div>
  <div class="bg sky-nuages"></div>
  <div class="sky-content">
    <img class="logo" src="IMG/logo_Picard.png" alt="Picard" draggable="false">
    <h1 class="invite-line">vous invite</h1>
    <img class="scroll-badge" src="IMG/scroll.png" alt="Scrollez pour commencer l'aventure" draggable="false">
  </div>
</section>

<!-- ===== Écran 2 : Forêt + révélation ===== -->
<section id="forest">
  <div class="forest-pin">
    <div class="bg f3"></div>
    <div class="bg f2"></div>
    <div class="bg f1"></div>
    <div class="stage">
      <div class="orbe-wrap">
        <div class="orbe-spin"><img src="IMG/ORBES.png" alt="" draggable="false"></div>
      </div>
      <p class="txt txt-prompt">Cliquez et<br>maintenez<br>pour révéler</p>
      <p class="txt txt-date">Rendez-vous<br>sur la Bon'App,<br>le 31 Août 2026,<br><span class="hour">11:11</span></p>
      <p class="txt txt-final">
        <span class="small">Le compte à rebours est lancé !</span>
        <span class="big">Soyez prêts !</span>
      </p>
    </div>
    <button class="replay" type="button">Recommencer</button>
  </div>
</section>

<script>
(function () {
  "use strict";

  /* ============================================================
     1. PARTICLE EMITTER
     ============================================================ */
  const canvas = document.getElementById('particles');
  const ctx = canvas.getContext('2d');

  const hasHover = window.matchMedia('(hover: hover) and (pointer: fine)').matches;
  if (hasHover) document.body.classList.add('custom-cursor');

  let DPR = Math.min(window.devicePixelRatio || 1, 2);
  function resizeCanvas() {
    DPR = Math.min(window.devicePixelRatio || 1, 2);
    canvas.width = Math.floor(window.innerWidth * DPR);
    canvas.height = Math.floor(window.innerHeight * DPR);
    canvas.style.width = window.innerWidth + 'px';
    canvas.style.height = window.innerHeight + 'px';
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  }
  resizeCanvas();

  const PARAMS = { density: 5, size: 3, speed: 1.2, decay: 0.005, gravity: 0.04, wiggle: 2, halo: 0, step: 4 };
  const COLORS = ['#ffd700','#ffed4a','#fff0a0','#f5c518','#ffe680','#ffc200','#fffbe6','#ffffff'];
  const particles = [];

  function spawn(x, y) {
    for (let i = 0; i < PARAMS.density; i++) {
      const angle = Math.random() * Math.PI * 2;
      const spd = PARAMS.speed * (0.4 + Math.random() * 1.1);
      particles.push({
        x: x, y: y, vx: Math.cos(angle) * spd, vy: Math.sin(angle) * spd,
        r: PARAMS.size * (0.5 + Math.random()), life: 1,
        color: COLORS[(Math.random() * COLORS.length) | 0],
        wFreq: 0.05 + Math.random() * 0.15, wPhase: Math.random() * Math.PI * 2, age: 0
      });
    }
  }

  let pressed = false;
  let lastX = 0, lastY = 0;
  let cursorX = -100, cursorY = -100, cursorVisible = false;

  function emitTo(x, y) {
    const dx = x - lastX, dy = y - lastY;
    const dist = Math.hypot(dx, dy);
    if (dist >= PARAMS.step) {
      const steps = Math.floor(dist / PARAMS.step);
      for (let i = 1; i <= steps; i++) { const t = i / steps; spawn(lastX + dx * t, lastY + dy * t); }
      lastX = x; lastY = y;
    }
  }
  function pressStart(x, y) { pressed = true; lastX = x; lastY = y; spawn(x, y); }
  function pressEnd() { pressed = false; }

  window.addEventListener('mousedown', function (e) { pressStart(e.clientX, e.clientY); });
  window.addEventListener('mousemove', function (e) {
    cursorX = e.clientX; cursorY = e.clientY; cursorVisible = true;
    if (pressed) emitTo(e.clientX, e.clientY);
  });
  window.addEventListener('mouseup', pressEnd);

  window.addEventListener('touchstart', function (e) {
    const t = e.touches[0]; pressStart(t.clientX, t.clientY);
    if (revealActive) e.preventDefault();
  }, { passive: false });
  window.addEventListener('touchmove', function (e) {
    const t = e.touches[0]; emitTo(t.clientX, t.clientY);
    if (revealActive) e.preventDefault();
  }, { passive: false });
  window.addEventListener('touchend', function (e) {
    pressEnd();
    if (revealActive) e.preventDefault();
  }, { passive: false });


  /* ============================================================
     2. SCROLL : parallax d'arrivée puis décor figé
     ============================================================ */
  const skyCiel    = document.querySelector('.sky-ciel');
  const skyNuages  = document.querySelector('.sky-nuages');
  const skyContent = document.querySelector('.sky-content');
  const forest     = document.getElementById('forest');
  const f1 = document.querySelector('.f1');
  const f2 = document.querySelector('.f2');
  const f3 = document.querySelector('.f3');

  let forestProgress = 0;   // 0 = on entre, 1 = forêt figée (bas de page)
  let revealActive = false;

  function clamp(v, a, b) { return v < a ? a : v > b ? b : v; }

  let ticking = false;
  function onScroll() { if (!ticking) { requestAnimationFrame(updateScroll); ticking = true; } }

  function updateScroll() {
    const sy = window.scrollY || window.pageYOffset;
    const vh = window.innerHeight;

    // Ciel : léger parallax (l'écran du haut s'éloigne plus lentement)
    skyCiel.style.transform   = 'translateY(' + (sy * 0.35).toFixed(1) + 'px) scale(1.05)';
    skyNuages.style.transform = 'translateY(' + (sy * 0.55).toFixed(1) + 'px)';
    skyContent.style.transform = 'translateY(' + (sy * 0.25).toFixed(1) + 'px)';
    skyContent.style.opacity = clamp(1 - sy / (vh * 0.7), 0, 1).toFixed(3);

    // Forêt : arrivée en parallax (calques montent à des vitesses différentes)
    // jusqu'à forestProgress ~0.5, puis FIGÉE.
    const forRun = forest.offsetHeight - vh;
    forestProgress = clamp((sy - forest.offsetTop) / (forRun || 1), 0, 1);
    const enter = clamp(forestProgress / 0.5, 0, 1);     // 0 -> 1 sur la 1re moitié
    const settle = 1 - enter;                            // 1 -> 0
    f3.style.transform = 'translateY(' + (settle * vh * 0.10).toFixed(1) + 'px) scale(1.04)';
    f2.style.transform = 'translateY(' + (settle * vh * 0.22).toFixed(1) + 'px) scale(1.04)';
    f1.style.transform = 'translateY(' + (settle * vh * 0.38).toFixed(1) + 'px) scale(1.04)';

    ticking = false;
  }
  window.addEventListener('scroll', onScroll, { passive: true });
  window.addEventListener('resize', function () { resizeCanvas(); updateScroll(); });


  /* ============================================================
     3. RÉVÉLATION : clic maintenu -> orbe grossit, 3 textes défilent
     ============================================================ */
  const orbeWrap  = document.querySelector('.orbe-wrap');
  const txtPrompt = document.querySelector('.txt-prompt');
  const txtDate   = document.querySelector('.txt-date');
  const txtFinal  = document.querySelector('.txt-final');
  const replay    = document.querySelector('.replay');

  let charge = 0;          // 0..1
  let completed = false;
  const CHARGE_UP = 0.009;   // ~1.85 s pour remplir
  const CHARGE_DOWN = 0.02;

  replay.addEventListener('click', function () {
    completed = false; charge = 0;
    replay.classList.remove('show');
    window.scrollTo({ top: 0, behavior: 'smooth' });
  });

  function reveal() {
    // Forêt « arrivée » : l'orbe apparaît quand le décor se pose
    const climax = clamp((forestProgress - 0.32) / 0.18, 0, 1);
    revealActive = forestProgress > 0.5 && !completed;

    if (revealActive && pressed) {
      charge = clamp(charge + CHARGE_UP, 0, 1);
    } else if (!completed) {
      charge = clamp(charge - CHARGE_DOWN, 0, 1);
    }

    // Orbe : visible à l'arrivée, GROSSIT fortement avec la charge (~ sort de l'écran)
    orbeWrap.style.opacity = (0.30 + climax * 0.70).toFixed(3);
    orbeWrap.style.transform = 'scale(' + (0.82 + climax * 0.10 + charge * 1.7).toFixed(3) + ')';

    if (!completed) {
      // 1) prompt -> 2) date : défilement vertical + cross-fade piloté par la charge
      const pOut = clamp(charge / 0.22, 0, 1);            // prompt s'efface
      txtPrompt.style.opacity = (climax * (1 - pOut)).toFixed(3);
      txtPrompt.style.transform = 'translateY(' + (pOut * -28).toFixed(1) + 'px)';

      const dIn = clamp((charge - 0.18) / 0.5, 0, 1);     // date entre
      txtDate.style.opacity = dIn.toFixed(3);
      txtDate.style.transform = 'translateY(' + ((1 - dIn) * 28).toFixed(1) + 'px) scale(' + (0.8 + dIn * 0.2).toFixed(3) + ')';

      txtFinal.style.opacity = '0';
    }

    if (charge >= 1 && !completed) {
      completed = true;
      revealActive = false;
      // 3) message final, dans la forêt
      txtPrompt.style.opacity = '0';
      txtDate.style.transition = 'opacity 0.6s ease, transform 0.6s ease';
      txtDate.style.opacity = '0';
      txtDate.style.transform = 'translateY(-28px) scale(1.05)';
      txtFinal.style.transition = 'opacity 1s ease 0.35s, transform 1s ease 0.35s';
      txtFinal.style.opacity = '1';
      txtFinal.style.transform = 'translateY(0)';
      replay.classList.add('show');
    }
  }


  /* ============================================================
     4. RENDER LOOP
     ============================================================ */
  function render() {
    ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);

    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.age++;
      p.vy += PARAMS.gravity;
      const wiggleX = Math.sin(p.age * p.wFreq + p.wPhase) * PARAMS.wiggle * 0.1;
      p.x += p.vx + wiggleX; p.y += p.vy; p.life -= PARAMS.decay;
      if (p.life <= 0) { particles.splice(i, 1); continue; }
      const radius = Math.max(0, p.r * p.life);
      ctx.globalAlpha = p.life;
      if (PARAMS.halo > 0) { ctx.shadowBlur = PARAMS.halo; ctx.shadowColor = p.color; }
      ctx.beginPath();
      ctx.arc(p.x, p.y, radius, 0, Math.PI * 2);
      ctx.fillStyle = p.color; ctx.fill();
    }
    ctx.globalAlpha = 1; ctx.shadowBlur = 0;

    if (hasHover && cursorVisible) {
      ctx.beginPath();
      ctx.arc(cursorX, cursorY, 5, 0, Math.PI * 2);
      ctx.strokeStyle = 'rgba(201,168,76,0.7)';
      ctx.lineWidth = 1; ctx.stroke();
    }

    reveal();
    requestAnimationFrame(render);
  }

  updateScroll();
  requestAnimationFrame(render);
})();
</script>
</body>
</html>
